<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BodyLog — 引导 - 个人信息</title>
    <style id="theme-vars">
/* ═══════════════════════════════════════════════════════════
   BodyLog — Apple HIG-Inspired Design System
   "Calm Precision" — where health data meets beauty
   ═══════════════════════════════════════════════════════════ */

:root {
  /* ── Brand Colors ── */
  --color-primary: #30D158;
  --color-primary-deep: #28A745;
  --color-primary-pale: rgba(48, 209, 88, 0.08);
  --color-primary-soft: rgba(48, 209, 88, 0.15);

  /* ── Semantic ── */
  --state-success: #30D158;
  --state-warning: #FFD60A;
  --state-danger: #FF453A;
  --state-info: #0A84FF;

  /* ── Surface Model (Apple HIG Grouped) ── */
  --surface-base: #F2F2F7;
  --surface-primary: #FFFFFF;
  --surface-elevated: #FFFFFF;
  --surface-secondary: #FFFFFF;
  --surface-tertiary: #F2F2F7;

  /* ── Text Hierarchy ── */
  --text-primary: #1C1C1E;
  --text-secondary: rgba(28, 28, 30, 0.55);
  --text-tertiary: rgba(28, 28, 30, 0.28);
  --text-quaternary: rgba(28, 28, 30, 0.15);
  --text-on-color: #FFFFFF;

  /* ── Separators & Fills ── */
  --separator: rgba(60, 60, 67, 0.08);
  --separator-opaque: #C6C6C8;
  --fill-tertiary: rgba(118, 118, 128, 0.12);
  --fill-quaternary: rgba(118, 118, 128, 0.08);
  --fill-secondary: rgba(120, 120, 128, 0.16);

  /* ── Chart Palette ── */
  --chart-primary: #30D158;
  --chart-gradient-top: rgba(48, 209, 88, 0.25);
  --chart-gradient-bottom: rgba(48, 209, 88, 0.01);
  --chart-danger: #FF453A;
  --chart-warning: #FF9F0A;
  --chart-info: #0A84FF;
  --chart-purple: #BF5AF2;

  /* ── Metric Accent Colors ── */
  --accent-weight: #30D158;
  --accent-bodyfat: #0A84FF;
  --accent-muscle: #FF9F0A;
  --accent-bmi: #FF453A;
  --accent-waist: #BF5AF2;
  --accent-chest: #64D2FF;

  /* ── Typography (SF Pro Scale) ── */
  --font-system: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
  --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, 'Cascadia Code', Menlo, monospace;

  /* Dynamic Type scale */
  --t-caption2: 0.6875rem; /* 11px */
  --t-caption1: 0.75rem;   /* 12px */
  --t-footnote: 0.8125rem; /* 13px */
  --t-subhead: 0.875rem;   /* 14px */
  --t-body: 0.9375rem;     /* 15px */
  --t-title3: 1rem;        /* 16px */
  --t-title2: 1.125rem;    /* 18px */
  --t-title1: 1.375rem;    /* 22px */
  --t-large-title: 1.625rem; /* 26px */
  --t-display1: 2rem;      /* 32px */
  --t-display2: 2.5rem;    /* 40px */
  --t-display3: 3.125rem;  /* 50px — hero numbers */

  /* Weights */
  --w-regular: 400;
  --w-medium: 500;
  --w-semibold: 600;
  --w-bold: 700;

  /* Tracking */
  --tracking-tight: -0.025em;
  --tracking-normal: -0.01em;
  --tracking-wide: 0.02em;

  /* ── Spacing ── */
  --sp-1: 2px;
  --sp-2: 4px;
  --sp-3: 8px;
  --sp-4: 12px;
  --sp-5: 16px;
  --sp-6: 20px;
  --sp-7: 24px;
  --sp-8: 28px;
  --sp-9: 32px;
  --sp-10: 40px;
  --sp-11: 48px;
  --sp-12: 64px;

  /* ── Radius (Apple HIG Continuum) ── */
  --r-xs: 4px;
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-2xl: 20px;
  --r-full: 9999px;

  /* ── Shadows (ultra-subtle, Apple style) ── */
  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.04);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.08);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.14);

  /* ── Motion ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 120ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
}

/* ── Dark Mode ── */
.dark {
  --surface-base: #000000;
  --surface-primary: #1C1C1E;
  --surface-elevated: #2C2C2E;
  --surface-secondary: #1C1C1E;
  --surface-tertiary: #2C2C2E;

  --text-primary: #FFFFFF;
  --text-secondary: rgba(235, 235, 245, 0.55);
  --text-tertiary: rgba(235, 235, 245, 0.28);
  --text-quaternary: rgba(235, 235, 245, 0.15);
  --text-on-color: #FFFFFF;

  --separator: rgba(235, 235, 245, 0.08);
  --separator-opaque: #38383A;
  --fill-tertiary: rgba(118, 118, 128, 0.24);
  --fill-quaternary: rgba(118, 118, 128, 0.16);
  --fill-secondary: rgba(120, 120, 128, 0.24);

  --color-primary-pale: rgba(48, 209, 88, 0.12);
  --color-primary-soft: rgba(48, 209, 88, 0.22);

  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.2);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.5);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body style="background: var(--surface-base); margin: 0; padding: 0; min-height: 100vh; display: flex; justify-content: center; font-family: var(--font-system); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; color: var(--text-primary);">
    <main style="width: 100%; max-width: 430px; min-height: 100vh; display: flex; flex-direction: column; position: relative; box-sizing: border-box;">

      <!-- NAV -->
      <div style="padding-top: 56px; padding-left: var(--sp-7); padding-right: var(--sp-7); display: flex; align-items: center; justify-content: space-between;">
        <button data-dom-id="btn-back-2" style="background: none; border: none; font-family: var(--font-system); font-size: var(--t-body); font-weight: var(--w-regular); color: var(--color-primary); cursor: pointer; padding: 0; display: flex; align-items: center; gap: var(--sp-1);">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 3L5 8L10 13" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          返回
        </button>
        <button style="background: none; border: none; font-family: var(--font-system); font-size: var(--t-body); font-weight: var(--w-regular); color: var(--text-secondary); cursor: pointer; padding: 0;">跳过</button>
      </div>

      <!-- Progress Dots -->
      <div style="display: flex; justify-content: center; gap: 8px; margin-top: var(--sp-6);">
        <span style="width: 6px; height: 6px; border-radius: var(--r-full); background: transparent; border: 1.5px solid var(--fill-secondary); margin-top: 1px;"></span>
        <span style="width: 8px; height: 8px; border-radius: var(--r-full); background: var(--color-primary);"></span>
        <span style="width: 6px; height: 6px; border-radius: var(--r-full); background: transparent; border: 1.5px solid var(--fill-secondary); margin-top: 1px;"></span>
      </div>

      <!-- TITLE -->
      <h1 style="margin-top: var(--sp-7); padding-left: var(--sp-7); padding-right: var(--sp-7); font-size: var(--t-large-title); font-weight: var(--w-bold); letter-spacing: var(--tracking-tight); color: var(--text-primary); line-height: 1.3;">填写基本信息</h1>

      <!-- FORM -->
      <div style="margin-top: var(--sp-9); padding-left: var(--sp-7); padding-right: var(--sp-7);">

        <!-- Name Field -->
        <div>
          <label style="display: flex; align-items: center; gap: var(--sp-2); font-size: var(--t-subhead); font-weight: var(--w-medium); color: var(--text-secondary); margin-bottom: var(--sp-3);">
            <i data-lucide="person" style="width: 16px; height: 16px;"></i>
            你的名字（可选）
          </label>
          <input type="text" placeholder="昵称" style="width: 100%; height: 48px; padding: 0 14px; border: none; border-radius: var(--r-md); background: var(--surface-tertiary); font-family: var(--font-system); font-size: var(--t-body); font-weight: var(--w-regular); color: var(--text-primary); box-sizing: border-box; outline: none; -webkit-appearance: none;">
        </div>

        <!-- Height Field -->
        <div style="margin-top: var(--sp-6);">
          <label style="display: flex; align-items: center; gap: var(--sp-2); font-size: var(--t-subhead); font-weight: var(--w-medium); color: var(--text-secondary); margin-bottom: var(--sp-3);">
            <i data-lucide="ruler" style="width: 16px; height: 16px;"></i>
            身高（cm）
          </label>
          <input type="text" inputmode="numeric" pattern="[0-9]*" value="175" style="width: 100%; height: 48px; padding: 0 14px; border: none; border-radius: var(--r-md); background: var(--surface-tertiary); font-family: var(--font-system); font-size: var(--t-body); font-weight: var(--w-regular); color: var(--text-primary); box-sizing: border-box; outline: none; -webkit-appearance: none;">
        </div>

        <!-- Gender Picker -->
        <div style="margin-top: var(--sp-6);">
          <label style="display: flex; align-items: center; gap: var(--sp-2); font-size: var(--t-subhead); font-weight: var(--w-medium); color: var(--text-secondary); margin-bottom: var(--sp-3);">
            <i data-lucide="users" style="width: 16px; height: 16px;"></i>
            性别
          </label>
          <div style="display: flex; gap: var(--sp-3);">
            <button class="gender-pill active" style="flex: 1; height: 44px; border: none; border-radius: var(--r-md); background: var(--color-primary); color: var(--text-on-color); font-family: var(--font-system); font-size: var(--t-subhead); font-weight: var(--w-medium); cursor: pointer; transition: all var(--duration-fast) var(--ease-default);">男</button>
            <button class="gender-pill" style="flex: 1; height: 44px; border: none; border-radius: var(--r-md); background: var(--surface-primary); color: var(--text-primary); font-family: var(--font-system); font-size: var(--t-subhead); font-weight: var(--w-medium); cursor: pointer; transition: all var(--duration-fast) var(--ease-default); box-shadow: var(--shadow-1);">女</button>
            <button class="gender-pill" style="flex: 1; height: 44px; border: none; border-radius: var(--r-md); background: var(--surface-primary); color: var(--text-primary); font-family: var(--font-system); font-size: var(--t-subhead); font-weight: var(--w-medium); cursor: pointer; transition: all var(--duration-fast) var(--ease-default); box-shadow: var(--shadow-1);">不填</button>
          </div>
        </div>

        <!-- Unit Picker -->
        <div style="margin-top: var(--sp-6);">
          <label style="display: flex; align-items: center; gap: var(--sp-2); font-size: var(--t-subhead); font-weight: var(--w-medium); color: var(--text-secondary); margin-bottom: var(--sp-3);">
            <i data-lucide="scale" style="width: 16px; height: 16px;"></i>
            重量单位
          </label>
          <div style="display: flex; gap: var(--sp-3);">
            <button class="unit-pill active" style="flex: 1; height: 44px; border: none; border-radius: var(--r-md); background: var(--color-primary); color: var(--text-on-color); font-family: var(--font-system); font-size: var(--t-subhead); font-weight: var(--w-medium); cursor: pointer; transition: all var(--duration-fast) var(--ease-default);">kg</button>
            <button class="unit-pill" style="flex: 1; height: 44px; border: none; border-radius: var(--r-md); background: var(--surface-primary); color: var(--text-primary); font-family: var(--font-system); font-size: var(--t-subhead); font-weight: var(--w-medium); cursor: pointer; transition: all var(--duration-fast) var(--ease-default); box-shadow: var(--shadow-1);">lb</button>
          </div>
        </div>

      </div>

      <!-- CTA -->
      <div style="margin-top: auto; padding: 0 var(--sp-7) var(--sp-11);">
        <button data-dom-id="btn-next-2" style="width: 100%; height: 52px; border: none; border-radius: var(--r-lg); background: var(--color-primary); color: var(--text-on-color); font-family: var(--font-system); font-size: var(--t-body); font-weight: var(--w-semibold); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: var(--sp-3); transition: opacity var(--duration-fast) var(--ease-default);">
          下一步
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

    </main>

    <script>
      lucide.createIcons();

      // Gender pill toggle
      document.querySelectorAll('.gender-pill').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.gender-pill').forEach(b => {
            b.style.background = 'var(--surface-primary)';
            b.style.color = 'var(--text-primary)';
            b.style.boxShadow = 'var(--shadow-1)';
          });
          this.style.background = 'var(--color-primary)';
          this.style.color = 'var(--text-on-color)';
          this.style.boxShadow = 'none';
        });
      });

      // Unit pill toggle
      document.querySelectorAll('.unit-pill').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.unit-pill').forEach(b => {
            b.style.background = 'var(--surface-primary)';
            b.style.color = 'var(--text-primary)';
            b.style.boxShadow = 'var(--shadow-1)';
          });
          this.style.background = 'var(--color-primary)';
          this.style.color = 'var(--text-on-color)';
          this.style.boxShadow = 'none';
        });
      });
    </script>
</body>
</html>
