<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro 付费墙 — BodyLog</title>
    <style id="theme-vars">
/* ═══════════════════════════════════════════════════════════
   BodyLog — Apple HIG-Inspired Design System
   "Calm Precision" — where health data meets beauty
   ═══════════════════════════════════════════════════════════ */

:root {
  /* ── Brand Colors ── */
  --color-primary: #30D158;
  --color-primary-deep: #28A745;
  --color-primary-pale: rgba(48, 209, 88, 0.08);
  --color-primary-soft: rgba(48, 209, 88, 0.15);

  /* ── Semantic ── */
  --state-success: #30D158;
  --state-warning: #FFD60A;
  --state-danger: #FF453A;
  --state-info: #0A84FF;

  /* ── Surface Model (Apple HIG Grouped) ── */
  --surface-base: #F2F2F7;
  --surface-primary: #FFFFFF;
  --surface-elevated: #FFFFFF;
  --surface-secondary: #FFFFFF;
  --surface-tertiary: #F2F2F7;

  /* ── Text Hierarchy ── */
  --text-primary: #1C1C1E;
  --text-secondary: rgba(28, 28, 30, 0.55);
  --text-tertiary: rgba(28, 28, 30, 0.28);
  --text-quaternary: rgba(28, 28, 30, 0.15);
  --text-on-color: #FFFFFF;

  /* ── Separators & Fills ── */
  --separator: rgba(60, 60, 67, 0.08);
  --separator-opaque: #C6C6C8;
  --fill-tertiary: rgba(118, 118, 128, 0.12);
  --fill-quaternary: rgba(118, 118, 128, 0.08);
  --fill-secondary: rgba(120, 120, 128, 0.16);

  /* ── Chart Palette ── */
  --chart-primary: #30D158;
  --chart-gradient-top: rgba(48, 209, 88, 0.25);
  --chart-gradient-bottom: rgba(48, 209, 88, 0.01);
  --chart-danger: #FF453A;
  --chart-warning: #FF9F0A;
  --chart-info: #0A84FF;
  --chart-purple: #BF5AF2;

  /* ── Metric Accent Colors ── */
  --accent-weight: #30D158;
  --accent-bodyfat: #0A84FF;
  --accent-muscle: #FF9F0A;
  --accent-bmi: #FF453A;
  --accent-waist: #BF5AF2;
  --accent-chest: #64D2FF;

  /* ── Typography (SF Pro Scale) ── */
  --font-system: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
  --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, 'Cascadia Code', Menlo, monospace;

  /* Dynamic Type scale */
  --t-caption2: 0.6875rem; /* 11px */
  --t-caption1: 0.75rem;   /* 12px */
  --t-footnote: 0.8125rem; /* 13px */
  --t-subhead: 0.875rem;   /* 14px */
  --t-body: 0.9375rem;     /* 15px */
  --t-title3: 1rem;        /* 16px */
  --t-title2: 1.125rem;    /* 18px */
  --t-title1: 1.375rem;    /* 22px */
  --t-large-title: 1.625rem; /* 26px */
  --t-display1: 2rem;      /* 32px */
  --t-display2: 2.5rem;    /* 40px */
  --t-display3: 3.125rem;  /* 50px — hero numbers */

  /* Weights */
  --w-regular: 400;
  --w-medium: 500;
  --w-semibold: 600;
  --w-bold: 700;

  /* Tracking */
  --tracking-tight: -0.025em;
  --tracking-normal: -0.01em;
  --tracking-wide: 0.02em;

  /* ── Spacing ── */
  --sp-1: 2px;
  --sp-2: 4px;
  --sp-3: 8px;
  --sp-4: 12px;
  --sp-5: 16px;
  --sp-6: 20px;
  --sp-7: 24px;
  --sp-8: 28px;
  --sp-9: 32px;
  --sp-10: 40px;
  --sp-11: 48px;
  --sp-12: 64px;

  /* ── Radius (Apple HIG Continuum) ── */
  --r-xs: 4px;
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-2xl: 20px;
  --r-full: 9999px;

  /* ── Shadows (ultra-subtle, Apple style) ── */
  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.04);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.08);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.14);

  /* ── Motion ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 120ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
}

/* ── Dark Mode ── */
.dark {
  --surface-base: #000000;
  --surface-primary: #1C1C1E;
  --surface-elevated: #2C2C2E;
  --surface-secondary: #1C1C1E;
  --surface-tertiary: #2C2C2E;

  --text-primary: #FFFFFF;
  --text-secondary: rgba(235, 235, 245, 0.55);
  --text-tertiary: rgba(235, 235, 245, 0.28);
  --text-quaternary: rgba(235, 235, 245, 0.15);
  --text-on-color: #FFFFFF;

  --separator: rgba(235, 235, 245, 0.08);
  --separator-opaque: #38383A;
  --fill-tertiary: rgba(118, 118, 128, 0.24);
  --fill-quaternary: rgba(118, 118, 128, 0.16);
  --fill-secondary: rgba(120, 120, 128, 0.24);

  --color-primary-pale: rgba(48, 209, 88, 0.12);
  --color-primary-soft: rgba(48, 209, 88, 0.22);

  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.2);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.5);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body>
    <main>
      <div class="paywall-sheet">

        <!-- 1. Close Button -->
        <button class="btn-close" data-dom-id="btn-close-paywall" aria-label="关闭">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="13" fill="currentColor" opacity="0.12"/>
            <path d="M10.1 10.1a.65.65 0 0 1 .92 0L14 13.08l3-3a.65.65 0 1 1 .92.92l-3 3 3 3a.65.65 0 1 1-.92.92l-3-3-3 3a.65.65 0 0 1-.92-.92l3-3-3-3a.65.65 0 0 1 0-.92Z" fill="currentColor"/>
          </svg>
        </button>

        <!-- 2. Hero Icon -->
        <div class="hero-icon">
          <div class="hero-icon-circle">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
              <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5Zm0 2.18L18.35 7.8 12 11.4 5.65 7.8 12 4.18ZM5 8.3l6.5 3.75V20.5C7.2 19.24 5 15.62 5 12.8V8.3ZM13 20.5V12.05L19 8.3v4.5c0 2.82-2.2 6.44-6 7.7Z" fill="var(--color-primary)"/>
            </svg>
          </div>
        </div>

        <!-- 3. Title -->
        <div class="paywall-title">解锁 Pro 版本</div>

        <!-- 4. Subtitle -->
        <div class="paywall-subtitle">用数据和照片，见证你的身体变化</div>

        <!-- 5. Features Card -->
        <div class="features-card">
          <!-- Feature 1: 形体照片对比 -->
          <div class="feature-row">
            <div class="feature-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="7" height="9" rx="1.5" stroke="var(--color-primary)" stroke-width="1.5"/>
                <rect x="5" y="6" width="3" height="2" rx="0.5" fill="var(--color-primary)" opacity="0.3"/>
                <rect x="14" y="5" width="7" height="9" rx="1.5" stroke="var(--color-primary)" stroke-width="1.5"/>
                <rect x="16" y="7" width="3" height="2" rx="0.5" fill="var(--color-primary)" opacity="0.3"/>
                <rect x="2" y="15" width="8" height="5" rx="1.5" stroke="var(--color-primary)" stroke-width="1.5"/>
                <rect x="14" y="15" width="8" height="5" rx="1.5" stroke="var(--color-primary)" stroke-width="1.5"/>
              </svg>
            </div>
            <div class="feature-text">
              <div class="feature-name">形体照片对比</div>
              <div class="feature-desc">拍照记录，对比身形变化</div>
            </div>
            <div class="feature-check">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" fill="var(--color-primary)" opacity="0.12"/>
                <path d="M9.5 12.5l2 2 3.5-3.5" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

          <!-- Feature 2: CSV 数据导出导入 -->
          <div class="feature-row">
            <div class="feature-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <rect x="4" y="3" width="16" height="14" rx="2" stroke="var(--color-primary)" stroke-width="1.5"/>
                <path d="M8 7h8M8 10h5" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M12 20v-3m0 0l-2 2m2-2l2 2" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="feature-text">
              <div class="feature-name">CSV 数据导出导入</div>
              <div class="feature-desc">随时导出导入数据</div>
            </div>
            <div class="feature-check">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" fill="var(--color-primary)" opacity="0.12"/>
                <path d="M9.5 12.5l2 2 3.5-3.5" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

          <!-- Feature 3: 每日提醒 -->
          <div class="feature-row">
            <div class="feature-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9Z" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="feature-text">
              <div class="feature-name">每日提醒</div>
              <div class="feature-desc">自定义时间提醒记录</div>
            </div>
            <div class="feature-check">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" fill="var(--color-primary)" opacity="0.12"/>
                <path d="M9.5 12.5l2 2 3.5-3.5" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

          <!-- Feature 4: 无限目标 -->
          <div class="feature-row">
            <div class="feature-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="8" stroke="var(--color-primary)" stroke-width="1.5"/>
                <circle cx="12" cy="12" r="3" fill="var(--color-primary)" opacity="0.25" stroke="var(--color-primary)" stroke-width="1.5"/>
                <circle cx="12" cy="12" r="1" fill="var(--color-primary)"/>
                <path d="M12 2v2M12 20v2M2 12h2M20 12h2" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="feature-text">
              <div class="feature-name">无限目标</div>
              <div class="feature-desc">设置任意数量的健康目标</div>
            </div>
            <div class="feature-check">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" fill="var(--color-primary)" opacity="0.12"/>
                <path d="M9.5 12.5l2 2 3.5-3.5" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>

        </div>

        <!-- 6. Trust Badge -->
        <div class="trust-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5Z" fill="var(--color-primary)"/>
            <path d="M9 12l2 2 4-4" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

          <span>隐私优先 · 数据本地 · 一次买断</span>

        <!-- 7. Price Section -->
        <div class="price-section">
          <div class="price-value">¥18</div>
          <div class="price-note">一次性购买 · 永久使用</div>
        </div>

        <!-- 8. Buy Button -->
        <div class="buy-btn-wrap">
          <button class="buy-btn">解锁全部功能</button>
        </div>

        <!-- 9. Restore Link -->
        <div class="restore-link">恢复购买</div>

        <!-- 10. Legal -->
        <div class="legal-text">服务条款 · 隐私政策</div>

      </div>
    </main>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--font-system);
        background: var(--surface-base);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        display: flex;
        justify-content: center;
      }
      .paywall-sheet {
        width: 100%;
        max-width: 430px;
        min-height: 100vh;
        min-height: 100dvh;
        position: relative;
        background: var(--surface-base);
        overflow-x: hidden;
      }

      /* Close button */
      .btn-close {
        position: absolute;
        top: 0;
        right: 0;
        padding: var(--sp-5);
        z-index: 10;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--fill-secondary);
        -webkit-tap-highlight-color: transparent;
      }
      .btn-close svg { display: block; }

      /* Hero icon */
      .hero-icon {
        display: flex;
        justify-content: center;
        margin-top: var(--sp-9);
      }
      .hero-icon-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: var(--color-primary-pale);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Title */
      .paywall-title {
        text-align: center;
        margin-top: var(--sp-6);
        font-size: var(--t-large-title);
        font-weight: var(--w-bold);
        letter-spacing: var(--tracking-tight);
        color: var(--text-primary);
        line-height: 1.2;
      }

      /* Subtitle */
      .paywall-subtitle {
        text-align: center;
        margin-top: var(--sp-3);
        font-size: var(--t-body);
        color: var(--text-secondary);
        max-width: 260px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.4;
      }

      /* Features card */
      .features-card {
        margin-top: var(--sp-8);
        margin-left: var(--sp-6);
        margin-right: var(--sp-6);
        background: var(--surface-primary);
        border-radius: var(--r-xl);
        border: 1px solid var(--separator);
        overflow: hidden;
        box-shadow: var(--shadow-1);
      }
      .feature-row {
        display: flex;
        align-items: center;
        padding: 14px var(--sp-5);
        gap: 12px;
        position: relative;
      }
      .feature-row:not(:last-child)::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 52px;
        right: 0;
        height: 1px;
        background: var(--separator);
      }
      .feature-icon-wrap {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--color-primary-pale);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .feature-icon-wrap svg {
        color: var(--color-primary);
      }
      .feature-text {
        flex: 1;
        min-width: 0;
      }
      .feature-name {
        font-size: var(--t-subhead);
        font-weight: var(--w-semibold);
        color: var(--text-primary);
        line-height: 1.3;
      }
      .feature-desc {
        font-size: var(--t-caption1);
        color: var(--text-secondary);
        line-height: 1.3;
        margin-top: 1px;
      }
      .feature-check {
        flex-shrink: 0;
        color: var(--color-primary);
      }

      /* Trust badge */
      .trust-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: var(--sp-6);
        font-size: var(--t-footnote);
        font-weight: var(--w-medium);
        color: var(--text-secondary);
      }
      .trust-badge svg { flex-shrink: 0; }

      /* Price */
      .price-section {
        text-align: center;
        margin-top: var(--sp-7);
      }
      .price-value {
        font-family: var(--font-mono);
        font-size: var(--t-display2);
        font-weight: var(--w-bold);
        color: var(--text-primary);
        line-height: 1;
        letter-spacing: var(--tracking-tight);
      }
      .price-note {
        font-size: var(--t-footnote);
        color: var(--text-secondary);
        margin-top: var(--sp-3);
      }

      /* Buy button */
      .buy-btn-wrap {
        padding: 0 var(--sp-6);
        margin-top: var(--sp-6);
      }
      .buy-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 52px;
        border-radius: var(--r-lg);
        background: var(--color-primary);
        color: #FFFFFF;
        font-size: var(--t-body);
        font-weight: var(--w-semibold);
        border: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        letter-spacing: var(--tracking-normal);
        transition: transform var(--duration-fast) var(--ease-default), opacity var(--duration-fast) var(--ease-default);
      }
      .buy-btn:active {
        transform: scale(0.98);
        opacity: 0.85;
      }

      /* Restore link */
      .restore-link {
        text-align: center;
        margin-top: var(--sp-4);
        font-size: var(--t-footnote);
        color: var(--text-secondary);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      /* Legal */
      .legal-text {
        text-align: center;
        margin-top: var(--sp-7);
        padding-bottom: var(--sp-9);
        font-size: var(--t-caption1);
        color: var(--text-tertiary);
      }
    </style>
</body>
</html>
