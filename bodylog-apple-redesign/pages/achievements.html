<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就</title>
    <style id="theme-vars">
/* ═══════════════════════════════════════════════════════════
   BodyLog — Apple HIG-Inspired Design System
   "Calm Precision" — where health data meets beauty
   ═══════════════════════════════════════════════════════════ */

:root {
  /* ── Brand Colors ── */
  --color-primary: #30D158;
  --color-primary-deep: #28A745;
  --color-primary-pale: rgba(48, 209, 88, 0.08);
  --color-primary-soft: rgba(48, 209, 88, 0.15);

  /* ── Semantic ── */
  --state-success: #30D158;
  --state-warning: #FFD60A;
  --state-danger: #FF453A;
  --state-info: #0A84FF;

  /* ── Surface Model (Apple HIG Grouped) ── */
  --surface-base: #F2F2F7;
  --surface-primary: #FFFFFF;
  --surface-elevated: #FFFFFF;
  --surface-secondary: #FFFFFF;
  --surface-tertiary: #F2F2F7;

  /* ── Text Hierarchy ── */
  --text-primary: #1C1C1E;
  --text-secondary: rgba(28, 28, 30, 0.55);
  --text-tertiary: rgba(28, 28, 30, 0.28);
  --text-quaternary: rgba(28, 28, 30, 0.15);
  --text-on-color: #FFFFFF;

  /* ── Separators & Fills ── */
  --separator: rgba(60, 60, 67, 0.08);
  --separator-opaque: #C6C6C8;
  --fill-tertiary: rgba(118, 118, 128, 0.12);
  --fill-quaternary: rgba(118, 118, 128, 0.08);
  --fill-secondary: rgba(120, 120, 128, 0.16);

  /* ── Chart Palette ── */
  --chart-primary: #30D158;
  --chart-gradient-top: rgba(48, 209, 88, 0.25);
  --chart-gradient-bottom: rgba(48, 209, 88, 0.01);
  --chart-danger: #FF453A;
  --chart-warning: #FF9F0A;
  --chart-info: #0A84FF;
  --chart-purple: #BF5AF2;

  /* ── Metric Accent Colors ── */
  --accent-weight: #30D158;
  --accent-bodyfat: #0A84FF;
  --accent-muscle: #FF9F0A;
  --accent-bmi: #FF453A;
  --accent-waist: #BF5AF2;
  --accent-chest: #64D2FF;

  /* ── Typography (SF Pro Scale) ── */
  --font-system: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
  --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, 'Cascadia Code', Menlo, monospace;

  /* Dynamic Type scale */
  --t-caption2: 0.6875rem; /* 11px */
  --t-caption1: 0.75rem;   /* 12px */
  --t-footnote: 0.8125rem; /* 13px */
  --t-subhead: 0.875rem;   /* 14px */
  --t-body: 0.9375rem;     /* 15px */
  --t-title3: 1rem;        /* 16px */
  --t-title2: 1.125rem;    /* 18px */
  --t-title1: 1.375rem;    /* 22px */
  --t-large-title: 1.625rem; /* 26px */
  --t-display1: 2rem;      /* 32px */
  --t-display2: 2.5rem;    /* 40px */
  --t-display3: 3.125rem;  /* 50px — hero numbers */

  /* Weights */
  --w-regular: 400;
  --w-medium: 500;
  --w-semibold: 600;
  --w-bold: 700;

  /* Tracking */
  --tracking-tight: -0.025em;
  --tracking-normal: -0.01em;
  --tracking-wide: 0.02em;

  /* ── Spacing ── */
  --sp-1: 2px;
  --sp-2: 4px;
  --sp-3: 8px;
  --sp-4: 12px;
  --sp-5: 16px;
  --sp-6: 20px;
  --sp-7: 24px;
  --sp-8: 28px;
  --sp-9: 32px;
  --sp-10: 40px;
  --sp-11: 48px;
  --sp-12: 64px;

  /* ── Radius (Apple HIG Continuum) ── */
  --r-xs: 4px;
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-2xl: 20px;
  --r-full: 9999px;

  /* ── Shadows (ultra-subtle, Apple style) ── */
  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.04);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.08);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.14);

  /* ── Motion ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 120ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
}

/* ── Dark Mode ── */
.dark {
  --surface-base: #000000;
  --surface-primary: #1C1C1E;
  --surface-elevated: #2C2C2E;
  --surface-secondary: #1C1C1E;
  --surface-tertiary: #2C2C2E;

  --text-primary: #FFFFFF;
  --text-secondary: rgba(235, 235, 245, 0.55);
  --text-tertiary: rgba(235, 235, 245, 0.28);
  --text-quaternary: rgba(235, 235, 245, 0.15);
  --text-on-color: #FFFFFF;

  --separator: rgba(235, 235, 245, 0.08);
  --separator-opaque: #38383A;
  --fill-tertiary: rgba(118, 118, 128, 0.24);
  --fill-quaternary: rgba(118, 118, 128, 0.16);
  --fill-secondary: rgba(120, 120, 128, 0.24);

  --color-primary-pale: rgba(48, 209, 88, 0.12);
  --color-primary-soft: rgba(48, 209, 88, 0.22);

  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.2);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.5);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main style="
      max-width: 430px;
      margin: 0 auto;
      background: var(--surface-base);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      font-family: var(--font-system);
      padding-bottom: 40px;
    ">

      <!-- ════════════════════════════════════════
           1. NAV BAR
           ════════════════════════════════════════ -->
      <div style="
        padding-top: 56px;
        padding-left: 20px;
        padding-right: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 50;
        background: var(--surface-base);
      ">
        <!-- Left: back -->
        <button data-dom-id="btn-back-achievements" style="
          display: flex;
          align-items: center;
          gap: 4px;
          background: none;
          border: none;
          cursor: pointer;
          padding: 0;
        ">
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style="flex-shrink: 0;">
            <path d="M10 2L2 10L10 18" stroke="var(--color-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span style="
            font-size: var(--t-body);
            color: var(--color-primary);
            font-weight: var(--w-regular);
          ">返回</span>
        </button>

        <!-- Center: title -->
        <span style="
          font-size: var(--t-title2);
          font-weight: var(--w-semibold);
          color: var(--text-primary);
          position: absolute;
          left: 50%;
          transform: translateX(-50%);
        ">成就</span>

        <!-- Right: done -->
        <button style="
          background: none;
          border: none;
          cursor: pointer;
          padding: 0;
        ">
          <span style="
            font-size: var(--t-body);
            color: var(--color-primary);
            font-weight: var(--w-regular);
          ">完成</span>
        </button>
      </div>

      <!-- ════════════════════════════════════════
           2. SUMMARY CARD
           ════════════════════════════════════════ -->
      <div style="
        margin-top: 12px;
        padding-left: 20px;
        padding-right: 20px;
      ">
        <div style="
          background: var(--surface-primary);
          border-radius: var(--r-xl);
          padding: 28px;
          display: flex;
          flex-direction: column;
          align-items: center;
          border: 1px solid var(--separator);
          box-shadow: var(--shadow-1);
        ">
          <!-- SVG Ring 100px, 35% progress -->
          <div style="position: relative; width: 100px; height: 100px;">
            <svg width="100" height="100" viewBox="0 0 100 100" style="transform: rotate(-90deg);">
              <!-- Track -->
              <circle cx="50" cy="50" r="42" fill="none"
                stroke="var(--fill-quaternary)" stroke-width="8" />
              <!-- Progress 35%: circumference = 2*pi*42 = 263.89, dashoffset = 263.89 * (1 - 0.35) = 171.53 -->
              <circle cx="50" cy="50" r="42" fill="none"
                stroke="var(--color-primary)" stroke-width="8"
                stroke-linecap="round"
                stroke-dasharray="263.89"
                stroke-dashoffset="171.53"
                style="transition: stroke-dashoffset var(--duration-slow) var(--ease-default);" />
            </svg>
            <!-- Center text -->
            <div style="
              position: absolute;
              inset: 0;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 2px;
            ">
              <span style="
                font-size: 32px;
                font-weight: var(--w-bold);
                color: var(--color-primary);
                line-height: 1;
              ">6</span>
              <span style="
                font-size: var(--t-footnote);
                color: var(--text-secondary);
                font-weight: var(--w-regular);
              ">/ 24</span>
            </div>
          </div>

          <!-- Below ring -->
          <span style="
            margin-top: 8px;
            font-size: var(--t-footnote);
            font-weight: var(--w-medium);
            color: var(--text-secondary);
          ">已解锁成就</span>
        </div>
      </div>

      <!-- ════════════════════════════════════════
           3. CATEGORY: 坚持记录
           ════════════════════════════════════════ -->
      <div style="
        margin-top: 28px;
        padding-left: 20px;
        padding-right: 20px;
      ">
        <span style="
          display: block;
          font-size: var(--t-footnote);
          font-weight: var(--w-medium);
          color: var(--text-secondary);
          text-transform: uppercase;
          letter-spacing: 0.06em;
          padding-left: 4px;
          margin-bottom: 10px;
        ">坚持记录</span>

        <!-- 2x2 Grid -->
        <div style="
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
        ">
          <!-- Card 1: Unlocked - 一周坚持 -->
          <div style="
            background: var(--surface-primary);
            border-radius: var(--r-lg);
            padding: 14px 12px;
            border: 1px solid var(--separator);
            box-shadow: var(--shadow-1);
          ">
            <div style="
              width: 48px;
              height: 48px;
              border-radius: var(--r-full);
              background: var(--color-primary-pale);
              display: flex;
              align-items: center;
              justify-content: center;
              margin-bottom: 10px;
            ">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--color-primary)">
                <path d="M12 2C9.24 2 7 4.24 7 7c0 2.85 2.92 7.21 5 9.88 2.08-2.67 5-7.03 5-9.88 0-2.76-2.24-5-5-5zm0 7.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/>
              </svg>
            </div>
            <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 6px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="var(--state-success)">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
              </svg>
              <span style="
                font-size: var(--t-caption1);
                color: var(--state-success);
                font-weight: var(--w-medium);
              ">已解锁</span>
            </div>
            <span style="
              font-size: var(--t-subhead);
              font-weight: var(--w-medium);
              color: var(--text-primary);
              display: block;
            ">一周坚持</span>
          </div>

          <!-- Card 2: Unlocked - 初露锋芒 -->
          <div style="
            background: var(--surface-primary);
            border-radius: var(--r-lg);
            padding: 14px 12px;
            border: 1px solid var(--separator);
            box-shadow: var(--shadow-1);
          ">
            <div style="
              width: 48px;
              height: 48px;
              border-radius: var(--r-full);
              background: var(--color-primary-pale);
              display: flex;
              align-items: center;
              justify-content: center;
              margin-bottom: 10px;
            ">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--color-primary)">
                <path d="M12 2C9.24 2 7 4.24 7 7c0 2.85 2.92 7.21 5 9.88 2.08-2.67 5-7.03 5-9.88 0-2.76-2.24-5-5-5zm0 7.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/>
              </svg>
            </div>
            <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 6px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="var(--state-success)">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
              </svg>
              <span style="
                font-size: var(--t-caption1);
                color: var(--state-success);
                font-weight: var(--w-medium);
              ">已解锁</span>
            </div>
            <span style="
              font-size: var(--t-subhead);
              font-weight: var(--w-medium);
              color: var(--text-primary);
              display: block;
            ">初露锋芒</span>
          </div>

          <!-- Card 3: In Progress - 两周毅力 (2/14 = 14%) -->
          <div style="
            background: var(--surface-primary);
            border-radius: var(--r-lg);
            padding: 14px 12px;
            border: 1px solid var(--separator);
            box-shadow: var(--shadow-1);
          ">
            <div style="
              width: 48px;
              height: 48px;
              border-radius: var(--r-full);
              background: var(--fill-quaternary);
              display: flex;
              align-items: center;
              justify-content: center;
              margin-bottom: 10px;
            ">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--text-tertiary)">
                <path d="M12 2C9.24 2 7 4.24 7 7c0 2.85 2.92 7.21 5 9.88 2.08-2.67 5-7.03 5-9.88 0-2.76-2.24-5-5-5zm0 7.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/>
              </svg>
            </div>
            <!-- Progress bar -->
            <div style="
              height: 4px;
              background: var(--fill-quaternary);
              border-radius: var(--r-full);
              overflow: hidden;
              margin-bottom: 6px;
            ">
              <div style="
                width: 14%;
                height: 100%;
                background: var(--color-primary);
                border-radius: var(--r-full);
                transition: width var(--duration-slow) var(--ease-default);
              "></div>
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <span style="
                font-size: var(--t-subhead);
                font-weight: var(--w-medium);
                color: var(--text-primary);
              ">两周毅力</span>
              <span style="
                font-size: var(--t-caption1);
                color: var(--text-secondary);
                font-family: var(--font-mono);
              ">2/14</span>
            </div>
          </div>

          <!-- Card 4: Locked - 月度达人 -->
          <div style="
            background: var(--surface-primary);
            border-radius: var(--r-lg);
            padding: 14px 12px;
            border: 1px solid var(--separator);
            box-shadow: var(--shadow-1);
            opacity: 0.7;
          ">
            <div style="
              width: 48px;
              height: 48px;
              border-radius: var(--r-full);
              background: var(--fill-quaternary);
              display: flex;
              align-items: center;
              justify-content: center;
              margin-bottom: 10px;
            ">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--text-tertiary)">
                <path d="M12 2C9.24 2 7 4.24 7 7c0 2.85 2.92 7.21 5 9.88 2.08-2.67 5-7.03 5-9.88 0-2.76-2.24-5-5-5zm0 7.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/>
              </svg>
            </div>
            <span style="
              font-size: var(--t-subhead);
              font-weight: var(--w-medium);
              color: var(--text-primary);
              display: block;
              margin-bottom: 4px;
            ">月度达人</span>
            <span style="
              font-size: var(--t-caption1);
              color: var(--text-tertiary);
              font-weight: var(--w-medium);
            ">未开始</span>
          </div>
        </div>
      </div>

      <!-- ════════════════════════════════════════
           4. CATEGORY: 数据积累
           ════════════════════════════════════════ -->
      <div style="
        margin-top: 28px;
        padding-left: 20px;
        padding-right: 20px;
      ">
        <span style="
          display: block;
          font-size: var(--t-footnote);
          font-weight: var(--w-medium);
          color: var(--text-secondary);
          text-transform: uppercase;
          letter-spacing: 0.06em;
          padding-left: 4px;
          margin-bottom: 10px;
        ">数据积累</span>

        <!-- 2x2 Grid -->
        <div style="
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
        ">
          <!-- Card 1: Unlocked - 数据新手 -->
          <div style="
            background: var(--surface-primary);
            border-radius: var(--r-lg);
            padding: 14px 12px;
            border: 1px solid var(--separator);
            box-shadow: var(--shadow-1);
          ">
            <div style="
              width: 48px;
              height: 48px;
              border-radius: var(--r-full);
              background: var(--color-primary-pale);
              display: flex;
              align-items: center;
              justify-content: center;
              margin-bottom: 10px;
            ">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--color-primary)">
                <path d="M3 3v18h18V3H3zm16 16H5V5h14v14zM7 12h2v5H7v-5zm4-3h2v8h-2V9zm4-2h2v10h-2V7z"/>
              </svg>
            </div>
            <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 6px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="var(--state-success)">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
              </svg>
              <span style="
                font-size: var(--t-caption1);
                color: var(--state-success);
                font-weight: var(--w-medium);
              ">已解锁</span>
            </div>
            <span style="
              font-size: var(--t-subhead);
              font-weight: var(--w-medium);
              color: var(--text-primary);
              display: block;
            ">数据新手</span>
          </div>

          <!-- Card 2: In Progress - 数据积累 (35/50 = 70%) -->
          <div style="
            background: var(--surface-primary);
            border-radius: var(--r-lg);
            padding: 14px 12px;
            border: 1px solid var(--separator);
            box-shadow: var(--shadow-1);
          ">
            <div style="
              width: 48px;
              height: 48px;
              border-radius: var(--r-full);
              background: var(--fill-quaternary);
              display: flex;
              align-items: center;
              justify-content: center;
              margin-bottom: 10px;
            ">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--text-tertiary)">
                <path d="M3 3v18h18V3H3zm16 16H5V5h14v14zM7 12h2v5H7v-5zm4-3h2v8h-2V9zm4-2h2v10h-2V7z"/>
              </svg>
            </div>
            <!-- Progress bar -->
            <div style="
              height: 4px;
              background: var(--fill-quaternary);
              border-radius: var(--r-full);
              overflow: hidden;
              margin-bottom: 6px;
            ">
              <div style="
                width: 70%;
                height: 100%;
                background: var(--color-primary);
                border-radius: var(--r-full);
                transition: width var(--duration-slow) var(--ease-default);
              "></div>
            </div>
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <span style="
                font-size: var(--t-subhead);
                font-weight: var(--w-medium);
                color: var(--text-primary);
              ">数据积累</span>
              <span style="
                font-size: var(--t-caption1);
                color: var(--text-secondary);
                font-family: var(--font-mono);
              ">35/50</span>
            </div>
          </div>

          <!-- Card 3: Locked - 百条记录 -->
          <div style="
            background: var(--surface-primary);
            border-radius: var(--r-lg);
            padding: 14px 12px;
            border: 1px solid var(--separator);
            box-shadow: var(--shadow-1);
            opacity: 0.7;
