<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享卡片 - BodyLog</title>
    <style id="theme-vars">
/* ═══════════════════════════════════════════════════════════
   BodyLog — Apple HIG-Inspired Design System
   "Calm Precision" — where health data meets beauty
   ═══════════════════════════════════════════════════════════ */

:root {
  /* ── Brand Colors ── */
  --color-primary: #30D158;
  --color-primary-deep: #28A745;
  --color-primary-pale: rgba(48, 209, 88, 0.08);
  --color-primary-soft: rgba(48, 209, 88, 0.15);

  /* ── Semantic ── */
  --state-success: #30D158;
  --state-warning: #FFD60A;
  --state-danger: #FF453A;
  --state-info: #0A84FF;

  /* ── Surface Model (Apple HIG Grouped) ── */
  --surface-base: #F2F2F7;
  --surface-primary: #FFFFFF;
  --surface-elevated: #FFFFFF;
  --surface-secondary: #FFFFFF;
  --surface-tertiary: #F2F2F7;

  /* ── Text Hierarchy ── */
  --text-primary: #1C1C1E;
  --text-secondary: rgba(28, 28, 30, 0.55);
  --text-tertiary: rgba(28, 28, 30, 0.28);
  --text-quaternary: rgba(28, 28, 30, 0.15);
  --text-on-color: #FFFFFF;

  /* ── Separators & Fills ── */
  --separator: rgba(60, 60, 67, 0.08);
  --separator-opaque: #C6C6C8;
  --fill-tertiary: rgba(118, 118, 128, 0.12);
  --fill-quaternary: rgba(118, 118, 128, 0.08);
  --fill-secondary: rgba(120, 120, 128, 0.16);

  /* ── Chart Palette ── */
  --chart-primary: #30D158;
  --chart-gradient-top: rgba(48, 209, 88, 0.25);
  --chart-gradient-bottom: rgba(48, 209, 88, 0.01);
  --chart-danger: #FF453A;
  --chart-warning: #FF9F0A;
  --chart-info: #0A84FF;
  --chart-purple: #BF5AF2;

  /* ── Metric Accent Colors ── */
  --accent-weight: #30D158;
  --accent-bodyfat: #0A84FF;
  --accent-muscle: #FF9F0A;
  --accent-bmi: #FF453A;
  --accent-waist: #BF5AF2;
  --accent-chest: #64D2FF;

  /* ── Typography (SF Pro Scale) ── */
  --font-system: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
  --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, 'Cascadia Code', Menlo, monospace;

  /* Dynamic Type scale */
  --t-caption2: 0.6875rem; /* 11px */
  --t-caption1: 0.75rem;   /* 12px */
  --t-footnote: 0.8125rem; /* 13px */
  --t-subhead: 0.875rem;   /* 14px */
  --t-body: 0.9375rem;     /* 15px */
  --t-title3: 1rem;        /* 16px */
  --t-title2: 1.125rem;    /* 18px */
  --t-title1: 1.375rem;    /* 22px */
  --t-large-title: 1.625rem; /* 26px */
  --t-display1: 2rem;      /* 32px */
  --t-display2: 2.5rem;    /* 40px */
  --t-display3: 3.125rem;  /* 50px — hero numbers */

  /* Weights */
  --w-regular: 400;
  --w-medium: 500;
  --w-semibold: 600;
  --w-bold: 700;

  /* Tracking */
  --tracking-tight: -0.025em;
  --tracking-normal: -0.01em;
  --tracking-wide: 0.02em;

  /* ── Spacing ── */
  --sp-1: 2px;
  --sp-2: 4px;
  --sp-3: 8px;
  --sp-4: 12px;
  --sp-5: 16px;
  --sp-6: 20px;
  --sp-7: 24px;
  --sp-8: 28px;
  --sp-9: 32px;
  --sp-10: 40px;
  --sp-11: 48px;
  --sp-12: 64px;

  /* ── Radius (Apple HIG Continuum) ── */
  --r-xs: 4px;
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-2xl: 20px;
  --r-full: 9999px;

  /* ── Shadows (ultra-subtle, Apple style) ── */
  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.04);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.08);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.14);

  /* ── Motion ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 120ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
}

/* ── Dark Mode ── */
.dark {
  --surface-base: #000000;
  --surface-primary: #1C1C1E;
  --surface-elevated: #2C2C2E;
  --surface-secondary: #1C1C1E;
  --surface-tertiary: #2C2C2E;

  --text-primary: #FFFFFF;
  --text-secondary: rgba(235, 235, 245, 0.55);
  --text-tertiary: rgba(235, 235, 245, 0.28);
  --text-quaternary: rgba(235, 235, 245, 0.15);
  --text-on-color: #FFFFFF;

  --separator: rgba(235, 235, 245, 0.08);
  --separator-opaque: #38383A;
  --fill-tertiary: rgba(118, 118, 128, 0.24);
  --fill-quaternary: rgba(118, 118, 128, 0.16);
  --fill-secondary: rgba(120, 120, 128, 0.24);

  --color-primary-pale: rgba(48, 209, 88, 0.12);
  --color-primary-soft: rgba(48, 209, 88, 0.22);

  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.2);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.5);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased" style="background:var(--surface-base);font-family:var(--font-system);-webkit-font-smoothing:antialiased;">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { max-width: 430px; margin: 0 auto; position: relative; overflow-x: hidden; }

      /* Nav Bar */
      .nav-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        padding-top: 56px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface-base);
      }
      .nav-cancel {
        position: absolute;
        left: 20px;
        font-size: var(--t-body);
        color: var(--text-secondary);
        cursor: pointer;
        background: none;
        border: none;
        font-family: var(--font-system);
        font-weight: var(--w-regular);
        -webkit-font-smoothing: antialiased;
      }
      .nav-title {
        font-size: var(--t-title2);
        font-weight: var(--w-semibold);
        color: var(--text-primary);
        letter-spacing: var(--tracking-tight);
      }

      /* Share Card */
      .share-card-wrapper {
        margin-top: var(--sp-5);
        padding: 0 var(--sp-6);
      }
      .share-card {
        background: var(--surface-primary);
        border-radius: var(--r-xl);
        padding: var(--sp-7);
        box-shadow: var(--shadow-elevated);
        overflow: hidden;
      }

      /* Card Header */
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .card-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .card-brand {
        font-size: 18px;
        font-weight: var(--w-bold);
        color: var(--text-primary);
        letter-spacing: var(--tracking-tight);
      }
      .card-date {
        font-size: var(--t-caption1);
        color: var(--text-secondary);
      }
      .card-logo {
        width: 44px;
        height: 44px;
        border-radius: var(--r-full);
        background: var(--color-primary-pale);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .card-logo svg {
        width: 22px;
        height: 22px;
        color: var(--color-primary);
      }

      /* Card Separator */
      .card-sep {
        height: 0.5px;
        background: var(--separator);
        margin: var(--sp-6) 0;
      }

      /* Stats Row */
      .stats-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .stat-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .stat-icon {
        width: 22px;
        height: 22px;
        color: var(--color-primary);
        margin-bottom: 4px;
      }
      .stat-icon svg {
        width: 22px;
        height: 22px;
      }
      .stat-number {
        font-size: 24px;
        font-weight: var(--w-bold);
        color: var(--text-primary);
        font-family: var(--font-mono);
        letter-spacing: var(--tracking-tight);
        line-height: 1;
      }
      .stat-label {
        font-size: var(--t-caption1);
        color: var(--text-secondary);
      }
      .stat-divider {
        width: 0.5px;
        height: 40px;
        background: var(--separator);
        flex-shrink: 0;
      }

      /* Latest Metrics */
      .metrics-label {
        font-size: var(--t-footnote);
        font-weight: var(--w-medium);
        color: var(--text-secondary);
        margin-bottom: var(--sp-4);
      }
      .metric-row {
        display: flex;
        align-items: center;
        padding: 10px 0;
        gap: 12px;
      }
      .metric-icon-circle {
        width: 36px;
        height: 36px;
        border-radius: var(--r-full);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .metric-icon-circle svg {
        width: 18px;
        height: 18px;
      }
      .metric-icon-circle.weight {
        background: rgba(48, 209, 88, 0.1);
        color: var(--accent-weight);
      }
      .metric-icon-circle.bodyfat {
        background: rgba(10, 132, 255, 0.1);
        color: var(--accent-bodyfat);
      }
      .metric-icon-circle.muscle {
        background: rgba(255, 159, 10, 0.1);
        color: var(--accent-muscle);
      }
      .metric-name {
        flex: 1;
        font-size: var(--t-subhead);
        color: var(--text-primary);
        font-weight: var(--w-medium);
      }
      .metric-value {
        font-size: var(--t-subhead);
        font-weight: var(--w-semibold);
        color: var(--text-primary);
        font-family: var(--font-mono);
      }

      /* Card Footer */
      .card-footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding-top: var(--sp-3);
      }
      .card-footer-text {
        font-size: var(--t-caption2);
        color: var(--text-tertiary);
      }
      .card-footer-brand {
        font-size: var(--t-caption2);
        color: var(--color-primary);
        font-weight: var(--w-semibold);
      }

      /* Action Buttons */
      .action-buttons {
        margin-top: var(--sp-6);
        padding: 0 var(--sp-6);
      }
      .btn-share {
        width: 100%;
        height: 50px;
        border-radius: var(--r-lg);
        background: var(--color-primary);
        color: #fff;
        font-size: var(--t-body);
        font-weight: var(--w-semibold);
        font-family: var(--font-system);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: opacity var(--duration-fast) var(--ease-default);
        -webkit-font-smoothing: antialiased;
      }
      .btn-share:active { opacity: 0.8; }
      .btn-share svg { width: 18px; height: 18px; }

      .btn-save {
        width: 100%;
        height: 50px;
        border-radius: var(--r-lg);
        background: var(--color-primary-pale);
        color: var(--color-primary);
        font-size: var(--t-body);
        font-weight: var(--w-semibold);
        font-family: var(--font-system);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 10px;
        transition: opacity var(--duration-fast) var(--ease-default);
        -webkit-font-smoothing: antialiased;
      }
      .btn-save:active { opacity: 0.8; }
      .btn-save svg { width: 18px; height: 18px; }

      /* Bottom spacer */
      .bottom-spacer {
        height: var(--sp-10);
      }
    </style>
    <main>

      <!-- 1. Nav Bar -->
      <div class="nav-bar">
        <button class="nav-cancel" data-dom-id="btn-close-share">取消</button>
        <div class="nav-title">分享进度</div>
      </div>

      <!-- 2. Share Card Preview -->
      <div class="share-card-wrapper">
        <div class="share-card">

          <!-- Card Header -->
          <div class="card-header">
            <div class="card-header-left">
              <span class="card-brand">BodyLog</span>
              <span class="card-date">2026年6月27日</span>
            </div>
            <div class="card-logo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2C8 2 5 5 5 9v6c0 4 3 7 7 7s7-3 7-7V9c0-4-3-7-7-7z"/>
                <path d="M9 22v-4M15 22v-4"/>
                <path d="M12 2v3M12 8v4"/>
                <circle cx="8" cy="7" r="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="16" cy="7" r="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </div>
          </div>

          <div class="card-sep"></div>

          <!-- Stats Row -->
          <div class="stats-row">
            <div class="stat-col">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                  <path d="M8 2v4M16 2v4"/>
                  <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"/>
                </svg>
              </div>
              <div class="stat-number">45</div>
              <div class="stat-label">记录天数</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-col">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/>
                </svg>
              </div>
              <div class="stat-number">12</div>
              <div class="stat-label">连续天数</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-col">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="20" x2="18" y2="10"/>

          <div class="card-sep"></div>

          <!-- Latest Metrics -->
          <div class="metrics-label">最近记录</div>

          <div class="metric-row">

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3v18M5.5 8C5.5 8 8 6 12 6s6.5 2 6.5 2M5.5 16c0 0 2.5-2 6.5-2s6.5 2 6.5 2"/>

              </svg>
            </div>
            <span class="metric-name">体重</span>
            <span class="metric-value">72.5 kg</span>
          </div>

          <div class="metric-row">
            <div class="metric-icon-circle bodyfat">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2C8 2 5 5 5 9v6c0 4 3 7 7 7s7-3 7-7V9c0-4-3-7-7-7z"/>
                <path d="M12 22V15"/>
                <path d="M8 10a4 4 0 008 0"/>
              </svg>
            </div>
            <span class="metric-name">体脂率</span>
            <span class="metric-value">18.2%</span>
          </div>

          <div class="metric-row">
            <div class="metric-icon-circle muscle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 18v-3M10 18v-6M14 18v-4M18 18v-2"/>

                <circle cx="16" cy="8" r="2"/>
                <line x1="10" y1="6" x2="14" y2="8"/>
              </svg>
            </div>
            <span class="metric-name">肌肉量</span>
            <span class="metric-value">35.1 kg</span>
          </div>

          <div class="card-sep"></div>

          <!-- Card Footer -->
          <div class="card-footer">
            <span class="card-footer-text">隐私优先 · 数据本地存储</span>
            <span class="card-footer-text"> · </span>
            <span class="card-footer-brand">BodyLog</span>
          </div>

        </div>
      </div>

      <!-- 3. Action Buttons -->
      <div class="action-buttons">
        <button class="btn-share">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>

          分享这张卡片
        </button>
        <button class="btn-save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          保存到相册
        </button>
      </div>

      <!-- 4. Bottom Spacer -->
      <div class="bottom-spacer"></div>

    </main>
    <script>lucide.createIcons();</script>
