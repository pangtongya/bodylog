<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趋势 - BodyLog</title>
    <style id="theme-vars">
/* ═══════════════════════════════════════════════════════════
   BodyLog — Apple HIG-Inspired Design System
   "Calm Precision" — where health data meets beauty
   ═══════════════════════════════════════════════════════════ */

:root {
  /* ── Brand Colors ── */
  --color-primary: #30D158;
  --color-primary-deep: #28A745;
  --color-primary-pale: rgba(48, 209, 88, 0.08);
  --color-primary-soft: rgba(48, 209, 88, 0.15);

  /* ── Semantic ── */
  --state-success: #30D158;
  --state-warning: #FFD60A;
  --state-danger: #FF453A;
  --state-info: #0A84FF;

  /* ── Surface Model (Apple HIG Grouped) ── */
  --surface-base: #F2F2F7;
  --surface-primary: #FFFFFF;
  --surface-elevated: #FFFFFF;
  --surface-secondary: #FFFFFF;
  --surface-tertiary: #F2F2F7;

  /* ── Text Hierarchy ── */
  --text-primary: #1C1C1E;
  --text-secondary: rgba(28, 28, 30, 0.55);
  --text-tertiary: rgba(28, 28, 30, 0.28);
  --text-quaternary: rgba(28, 28, 30, 0.15);
  --text-on-color: #FFFFFF;

  /* ── Separators & Fills ── */
  --separator: rgba(60, 60, 67, 0.08);
  --separator-opaque: #C6C6C8;
  --fill-tertiary: rgba(118, 118, 128, 0.12);
  --fill-quaternary: rgba(118, 118, 128, 0.08);
  --fill-secondary: rgba(120, 120, 128, 0.16);

  /* ── Chart Palette ── */
  --chart-primary: #30D158;
  --chart-gradient-top: rgba(48, 209, 88, 0.25);
  --chart-gradient-bottom: rgba(48, 209, 88, 0.01);
  --chart-danger: #FF453A;
  --chart-warning: #FF9F0A;
  --chart-info: #0A84FF;
  --chart-purple: #BF5AF2;

  /* ── Metric Accent Colors ── */
  --accent-weight: #30D158;
  --accent-bodyfat: #0A84FF;
  --accent-muscle: #FF9F0A;
  --accent-bmi: #FF453A;
  --accent-waist: #BF5AF2;
  --accent-chest: #64D2FF;

  /* ── Typography (SF Pro Scale) ── */
  --font-system: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
  --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, 'Cascadia Code', Menlo, monospace;

  /* Dynamic Type scale */
  --t-caption2: 0.6875rem; /* 11px */
  --t-caption1: 0.75rem;   /* 12px */
  --t-footnote: 0.8125rem; /* 13px */
  --t-subhead: 0.875rem;   /* 14px */
  --t-body: 0.9375rem;     /* 15px */
  --t-title3: 1rem;        /* 16px */
  --t-title2: 1.125rem;    /* 18px */
  --t-title1: 1.375rem;    /* 22px */
  --t-large-title: 1.625rem; /* 26px */
  --t-display1: 2rem;      /* 32px */
  --t-display2: 2.5rem;    /* 40px */
  --t-display3: 3.125rem;  /* 50px — hero numbers */

  /* Weights */
  --w-regular: 400;
  --w-medium: 500;
  --w-semibold: 600;
  --w-bold: 700;

  /* Tracking */
  --tracking-tight: -0.025em;
  --tracking-normal: -0.01em;
  --tracking-wide: 0.02em;

  /* ── Spacing ── */
  --sp-1: 2px;
  --sp-2: 4px;
  --sp-3: 8px;
  --sp-4: 12px;
  --sp-5: 16px;
  --sp-6: 20px;
  --sp-7: 24px;
  --sp-8: 28px;
  --sp-9: 32px;
  --sp-10: 40px;
  --sp-11: 48px;
  --sp-12: 64px;

  /* ── Radius (Apple HIG Continuum) ── */
  --r-xs: 4px;
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-2xl: 20px;
  --r-full: 9999px;

  /* ── Shadows (ultra-subtle, Apple style) ── */
  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.04);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.08);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.14);

  /* ── Motion ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 120ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
}

/* ── Dark Mode ── */
.dark {
  --surface-base: #000000;
  --surface-primary: #1C1C1E;
  --surface-elevated: #2C2C2E;
  --surface-secondary: #1C1C1E;
  --surface-tertiary: #2C2C2E;

  --text-primary: #FFFFFF;
  --text-secondary: rgba(235, 235, 245, 0.55);
  --text-tertiary: rgba(235, 235, 245, 0.28);
  --text-quaternary: rgba(235, 235, 245, 0.15);
  --text-on-color: #FFFFFF;

  --separator: rgba(235, 235, 245, 0.08);
  --separator-opaque: #38383A;
  --fill-tertiary: rgba(118, 118, 128, 0.24);
  --fill-quaternary: rgba(118, 118, 128, 0.16);
  --fill-secondary: rgba(120, 120, 128, 0.24);

  --color-primary-pale: rgba(48, 209, 88, 0.12);
  --color-primary-soft: rgba(48, 209, 88, 0.22);

  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.2);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.5);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;

        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main style="padding-bottom: 120px;">

        <!-- 1. HEADER -->
        <div style="padding-top: 56px; padding-left: 20px; padding-right: 20px;">
            <h1 style="font-size: var(--t-display1); font-weight: var(--w-bold); letter-spacing: var(--tracking-tight); color: var(--text-primary); margin: 0; line-height: 1.1;">趋势</h1>
            <p style="font-size: var(--t-body); color: var(--text-secondary); margin-top: 2px; margin-bottom: 0;">体重</p>
        </div>

        <!-- 2. METRIC SELECTOR -->
        <div style="margin-top: 16px;">
            <div class="pill-row">
                <div class="pill pill-active">体重</div>
                <div class="pill pill-inactive">体脂率</div>
                <div class="pill pill-inactive">肌肉量</div>
                <div class="pill pill-inactive">BMI</div>
            </div>
        </div>

        <!-- 3. BIG CURRENT VALUE -->
        <div style="margin-top: 20px; padding-left: 20px; padding-right: 20px;">
            <div class="big-value-area">
                <span class="big-value-number">72.5</span>
                <span class="big-value-unit">kg</span>
                <div class="change-badge">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="flex-shrink:0;">
                        <path d="M5 1.5L5 8.5M5 1.5L2 4.5M5 1.5L8 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    1.8 kg
                </div>
            </div>
        </div>

        <!-- 4. STATS 2x2 GRID -->
        <div style="margin-top: 16px; padding-left: 20px; padding-right: 20px;">
            <div class="stats-grid">
                <!-- Card 1: 起始值 -->
                <div class="stat-card">
                    <div class="stat-label">
                        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;">
                            <path d="M6.5 3v7.5L3 7.5" stroke="var(--chart-info)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M6.5 3h6" stroke="var(--chart-info)" stroke-width="1.8" stroke-linecap="round"/>
                            <path d="M3.5 13h9" stroke="var(--chart-info)" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        起始值
                    </div>
                    <div class="stat-value">74.3 kg</div>
                </div>
                <!-- Card 2: 总变化 -->
                <div class="stat-card">
                    <div class="stat-label">
                        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;">
                            <path d="M4 11L8 5L12 11" stroke="var(--state-success)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4 5L8 11L12 5" stroke="var(--state-success)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        总变化
                    </div>
                    <div class="stat-value" style="color: var(--state-success);">-1.8 kg</div>
                </div>
                <!-- Card 3: 平均值 -->
                <div class="stat-card">
                    <div class="stat-label">
                        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;">
                            <text x="2" y="12" font-family="var(--font-system)" font-size="11" font-weight="600" fill="var(--chart-purple)">#</text>
                        </svg>
                        平均值
                    </div>
                    <div class="stat-value">73.1 kg</div>
                </div>
                <!-- Card 4: 记录次数 -->
                <div class="stat-card">
                    <div class="stat-label">
                        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;">
                            <circle cx="4" cy="4" r="1.5" fill="var(--chart-warning)"/>
                            <circle cx="4" cy="8.5" r="1.5" fill="var(--chart-warning)"/>
                            <circle cx="4" cy="13" r="1.5" fill="var(--chart-warning)"/>
                            <line x1="8" y1="4" x2="14" y2="4" stroke="var(--chart-warning)" stroke-width="1.3" stroke-linecap="round"/>
                            <line x1="8" y1="8.5" x2="14" y2="8.5" stroke="var(--chart-warning)" stroke-width="1.3" stroke-linecap="round"/>
                            <line x1="8" y1="13" x2="14" y2="13" stroke="var(--chart-warning)" stroke-width="1.3" stroke-linecap="round"/>
                        </svg>
                        记录次数
                    </div>
                    <div class="stat-value">45 次</div>
                </div>
            </div>
        </div>

        <!-- 5. CHART CARD -->
        <div style="margin-top: 16px; padding-left: 20px; padding-right: 20px;">
            <div class="chart-card">
                <!-- Goal Line Header -->
                <div class="chart-goal-header">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;">
                        <circle cx="12" cy="4" r="2.5" stroke="var(--color-primary)" stroke-width="1.4" fill="none"/>
                        <circle cx="12" cy="4" r="0.8" fill="var(--color-primary)"/>
                        <path d="M1 14l3-4 2.5 2L10 8l1.5 1" stroke="var(--color-primary)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>目标</span>
                    <span class="goal-value">70.0 kg</span>
                    <span class="goal-progress">进度 65%</span>
                </div>

                <!-- SVG Chart -->
                <svg viewBox="0 0 335 220" width="100%" height="220" style="overflow: visible;">
                    <defs>
                        <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="var(--chart-gradient-top)"/>
                            <stop offset="100%" stop-color="var(--chart-gradient-bottom)"/>
                        </linearGradient>
                    </defs>

                    <!-- Chart area: x 35..325, y 10..185. Y range: 75(top) to 70(bottom) -->
                    <line x1="35" y1="45" x2="325" y2="45" class="chart-grid-line"/>
                    <line x1="35" y1="80" x2="325" y2="80" class="chart-grid-line"/>
                    <line x1="35" y1="115" x2="325" y2="115" class="chart-grid-line"/>
                    <line x1="35" y1="150" x2="325" y2="150" class="chart-grid-line"/>

                    <!-- Y-axis labels -->
                    <text x="28" y="49" class="chart-axis-label" text-anchor="end">74</text>
                    <text x="28" y="84" class="chart-axis-label" text-anchor="end">73</text>
                    <text x="28" y="119" class="chart-axis-label" text-anchor="end">72</text>
                    <text x="28" y="154" class="chart-axis-label" text-anchor="end">71</text>

                    <!-- Goal line at 70.0 kg -->
                    <line x1="35" y1="185" x2="325" y2="185" class="chart-goal-line"/>
                    <text x="28" y="189" class="chart-axis-label" text-anchor="end" style="fill: var(--color-primary); opacity: 0.5;">70</text>

                    <!-- X-axis labels -->
                    <text x="35" y="203" class="chart-axis-label" text-anchor="middle">4/1</text>
                    <text x="76" y="203" class="chart-axis-label" text-anchor="middle">4/15</text>
                    <text x="118" y="203" class="chart-axis-label" text-anchor="middle">5/1</text>
                    <text x="159" y="203" class="chart-axis-label" text-anchor="middle">5/15</text>
                    <text x="201" y="203" class="chart-axis-label" text-anchor="middle">6/1</text>
                    <text x="242" y="203" class="chart-axis-label" text-anchor="middle">6/15</text>

                    <!-- Data: 74.3, 73.8, 74.0, 73.2, 73.5, 72.8, 72.9, 72.5 -->

                    <!-- Gradient fill area -->
                    <path d="M 35 34.5
                             C 52 34.5, 59 52, 76 52
                             C 93 52, 101 45, 118 45
                             C 135 45, 142 73, 159 73
                             C 176 73, 184 62.5, 201 62.5
                             C 218 62.5, 225 87, 242 87
                             C 259 87, 267 83.5, 284 83.5
                             C 301 83.5, 308 97.5, 325 97.5
                             L 325 185 L 35 185 Z"
                          fill="url(#chartGradient)"/>

                    <!-- Main curve line -->
                    <path d="M 35 34.5
                             C 52 34.5, 59 52, 76 52
                             C 93 52, 101 45, 118 45
                             C 135 45, 142 73, 159 73
                             C 176 73, 184 62.5, 201 62.5
                             C 218 62.5, 225 87, 242 87
                             C 259 87, 267 83.5, 284 83.5
                             C 301 83.5, 308 97.5, 325 97.5"
                          class="chart-line"/>

                    <!-- Data point dots -->
                    <circle cx="35" cy="34.5" r="4" class="chart-dot"/>
                    <circle cx="76" cy="52" r="4" class="chart-dot"/>
                    <circle cx="118" cy="45" r="4" class="chart-dot"/>
                    <circle cx="159" cy="73" r="4" class="chart-dot"/>
                    <circle cx="201" cy="62.5" r="4" class="chart-dot"/>
                    <circle cx="242" cy="87" r="4" class="chart-dot"/>
                    <circle cx="284" cy="83.5" r="4" class="chart-dot"/>

                    <!-- Latest point (larger, with label) -->
                    <circle cx="325" cy="97.5" r="6" class="chart-dot-latest"/>
                    <!-- Label bubble above latest point -->
                    <rect x="301" y="72" width="48" height="20" rx="6" fill="var(--text-primary)"/>
                    <text x="325" y="86" class="chart-label-bubble" text-anchor="middle" fill="var(--surface-primary)">72.5</text>
                    <!-- Bubble arrow -->
                    <polygon points="321,92 325,98 329,92" fill="var(--text-primary)"/>
                </svg>
            </div>
        </div>

        <!-- 6. TIME RANGE PICKER -->
        <div style="margin-top: 16px; padding-left: 20px; padding-right: 20px;">
            <div class="time-range">
                <div class="time-range-item">1月</div>
                <div class="time-range-item time-range-active">3月</div>
                <div class="time-range-item">6月</div>
                <div class="time-range-item">全部</div>
            </div>
        </div>

        <!-- 7. INSIGHTS CARD -->
        <div style="margin-top: 20px; padding-left: 20px; padding-right: 20px;">
            <!-- Section header -->
            <div style="display: flex; align-items: center; gap: 5px; margin-bottom: 10px;">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--chart-warning)" style="flex-shrink:0;">
                    <path d="M8 1.5L9.8 5.6L14.2 6.1L11 9.1L11.8 13.5L8 11.4L4.2 13.5L5 9.1L1.8 6.1L6.2 5.6Z"/>
                </svg>
                <span style="font-size: var(--t-footnote); font-weight: var(--w-medium); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em;">数据洞察</span>
            </div>

            <div class="insights-card">
                <!-- Row 1 -->
                <div class="insight-row">
                    <div class="insight-icon" style="background: var(--color-primary-pale);">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                            <rect x="2" y="3" width="16" height="14" rx="3" stroke="var(--color-primary)" stroke-width="1.5"/>
                            <line x1="2" y1="8" x2="18" y2="8" stroke="var(--color-primary)" stroke-width="1.5"/>
                            <line x1="7" y1="1" x2="7" y2="4" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round"/>
                            <line x1="13" y1="1" x2="13" y2="4" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round"/>
                            <circle cx="10" cy="13" r="2" fill="var(--color-primary)"/>
                        </svg>
                    </div>
                    <div style="flex: 1; min-width: 0;">
                        <div class="insight-text-title">30天减少了 0.8 kg</div>
                        <div class="insight-text-sub">做得好，继续坚持</div>
                    </div>
                </div>
                <!-- Row 2 -->
                <div class="insight-row">
                    <div class="insight-icon" style="background: rgba(255, 159, 10, 0.1);">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                            <path d="M10 2C10 2 4 8 4 12C4 15.3 6.7 18 10 18C13.3 18 16 15.3 16 12C16 8 10 2 10 2Z" fill="var(--chart-warning)"/>
                            <path d="M8 13C8 13 9 11 10 11C11 11 12 13 12 13" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div style="flex: 1; min-width: 0;">
                        <div class="insight-text-title">已连续记录 12天</div>
                        <div class="insight-text-sub" style="color: var(--chart-warning);">习惯正在养成，太棒了</div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- 8. BOTTOM TAB BAR -->
    <div class="tab-bar">
        <a class="tab-item" data-dom-id="tab-home">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9.5L12 3L21 9.5V20C21 20.55 20.55 21 20 21H15V14H9V21H4C3.45 21 3 20.55 3 20V9.5Z"/>
            </svg>
            <span>首页</span>
        </a>
        <a class="tab-item tab-active" data-dom-id="tab-trend">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            <span>趋势</span>
        </a>
        <a class="tab-item" data-dom-id="tab-goals">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9"/>
                <circle cx="12" cy="12" r="3"/>
                <line x1="12" y1="2" x2="12" y2="5"/>
                <line x1="12" y1="19" x2="12" y2="22"/>
            </svg>
            <span>目标</span>
        </a>
        <a class="tab-item" data-dom-id="tab-settings">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span>设置</span>
        </a>
    </div>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      *, *::before, *::after {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-system);
        background: var(--surface-base);
        color: var(--text-primary);
        margin: 0;
        padding: 0;
        max-width: 430px;
        margin-left: auto;
        margin-right: auto;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Metric pill row */
      .pill-row {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 0 20px;
      }
      .pill-row::-webkit-scrollbar { display: none; }
      .pill-row { -ms-overflow-style: none; scrollbar-width: none; }

      .pill {
        flex-shrink: 0;
        padding: 7px 16px;
        border-radius: var(--r-full);
        font-size: var(--t-subhead);
        font-weight: var(--w-medium);
        cursor: pointer;
        transition: all var(--duration-fast) var(--ease-default);
        white-space: nowrap;
      }
      .pill-active {
        background: var(--color-primary);
        color: var(--text-on-color);
        border: none;
      }
      .pill-inactive {
        background: var(--surface-primary);
        color: var(--text-secondary);
        border: 1px solid var(--separator);
      }
      .pill-inactive:active {
        background: var(--fill-tertiary);
      }

      /* Big value area */
      .big-value-area {
        display: flex;
        align-items: baseline;
        gap: 4px;
      }
      .big-value-number {
        font-size: var(--t-display3);
        font-weight: var(--w-bold);
        letter-spacing: var(--tracking-tight);
        color: var(--text-primary);
        font-family: var(--font-mono);
        line-height: 1;
      }
      .big-value-unit {
        font-size: var(--t-title2);
        color: var(--text-secondary);
        font-weight: var(--w-regular);
      }
      .change-badge {
        margin-left: auto;
        background: var(--color-primary-pale);
        color: var(--state-success);
        border-radius: var(--r-md);
        padding: 5px 10px;
        font-size: var(--t-subhead);
        font-weight: var(--w-semibold);
        font-family: var(--font-mono);
        display: flex;
        align-items: center;
        gap: 2px;
      }

      /* Stats grid */
      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .stat-card {
        background: var(--surface-primary);
        border-radius: var(--r-xl);
        padding: 14px;
        border: 1px solid var(--separator);
      }
      .stat-label {
        font-size: var(--t-caption1);
        color: var(--text-secondary);
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .stat-value {
        font-size: var(--t-title1);
        font-weight: var(--w-semibold);
        font-family: var(--font-mono);
        color: var(--text-primary);
        line-height: 1.15;
      }

      /* Chart card */
      .chart-card {
        background: var(--surface-primary);
        border-radius: var(--r-xl);
        padding: 20px;
        border: 1px solid var(--separator);
      }
      .chart-goal-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--separator);
        margin-bottom: 16px;
        font-size: var(--t-subhead);
        color: var(--text-secondary);
      }
      .chart-goal-header .goal-value {
        font-weight: var(--w-bold);
        color: var(--text-primary);
      }
      .chart-goal-header .goal-progress {
        margin-left: auto;
        font-size: var(--t-caption1);
        color: var(--color-primary);
        font-weight: var(--w-semibold);
        font-family: var(--font-mono);
      }

      /* Time range picker */
      .time-range {
        display: flex;
        background: var(--fill-tertiary);
        border-radius: var(--r-lg);
        padding: 3px;
      }
      .time-range-item {
        flex: 1;
        text-align: center;
        padding: 7px 0;
        border-radius: var(--r-md);
        font-size: var(--t-subhead);
        font-weight: var(--w-regular);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all var(--duration-fast) var(--ease-default);
      }
      .time-range-active {
        background: var(--surface-primary);
        box-shadow: var(--shadow-1);
        font-weight: var(--w-semibold);
        color: var(--text-primary);
      }

      /* Insights card */
      .insights-card {
        background: var(--surface-primary);
        border-radius: var(--r-xl);
        border: 1px solid var(--separator);
        overflow: hidden;
      }
      .insight-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
      }
      .insight-row + .insight-row {
        border-top: 1px solid var(--separator);
      }
      .insight-icon {
        width: 36px;
        height: 36px;
        border-radius: var(--r-full);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .insight-text-title {
        font-size: var(--t-body);
        font-weight: var(--w-medium);
        color: var(--text-primary);
        line-height: 1.3;
      }
      .insight-text-sub {
        font-size: var(--t-footnote);
        color: var(--color-primary);
        line-height: 1.3;
        margin-top: 1px;
      }

      /* Tab bar */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 430px;
        background: var(--surface-primary);
        border-top: 0.5px solid var(--separator);
        display: flex;
        padding-bottom: env(safe-area-inset-bottom, 20px);
        z-index: 100;
      }
      .tab-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding-top: 8px;
        padding-bottom: 6px;
        font-size: var(--t-caption2);
        color: var(--text-secondary);
        cursor: pointer;
        transition: color var(--duration-fast) var(--ease-default);
        text-decoration: none;
        background: none;
        border: none;
        font-family: var(--font-system);
      }
      .tab-item.tab-active {
        color: var(--color-primary);
      }
      .tab-icon {
        width: 24px;
        height: 24px;
      }

      /* SVG chart styles */
      .chart-grid-line {
        stroke: var(--separator);
        stroke-width: 0.5;
      }
      .chart-goal-line {
        stroke: var(--color-primary);
        stroke-width: 1;
        stroke-dasharray: 6,4;
        opacity: 0.4;
      }
      .chart-line {
        fill: none;
        stroke: var(--color-primary);
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .chart-dot {
        fill: var(--color-primary);
        stroke: var(--surface-primary);
        stroke-width: 2;
      }
      .chart-dot-latest {
        fill: var(--color-primary);
        stroke: var(--surface-primary);
        stroke-width: 2.5;
      }
      .chart-label {
        fill: var(--text-primary);
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: var(--w-semibold);
      }
      .chart-axis-label {
        fill: var(--text-tertiary);
        font-family: var(--font-system);
        font-size: 10px;
      }
      .chart-label-bubble {
        fill: var(--text-primary);
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: var(--w-bold);
      }
    </style>
</body>
</html>
