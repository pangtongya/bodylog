<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BodyLog - Onboarding Metrics</title>
    <style id="theme-vars">
/* ═══════════════════════════════════════════════════════════
   BodyLog — Apple HIG-Inspired Design System
   "Calm Precision" — where health data meets beauty
   ═══════════════════════════════════════════════════════════ */

:root {
  /* ── Brand Colors ── */
  --color-primary: #30D158;
  --color-primary-deep: #28A745;
  --color-primary-pale: rgba(48, 209, 88, 0.08);
  --color-primary-soft: rgba(48, 209, 88, 0.15);

  /* ── Semantic ── */
  --state-success: #30D158;
  --state-warning: #FFD60A;
  --state-danger: #FF453A;
  --state-info: #0A84FF;

  /* ── Surface Model (Apple HIG Grouped) ── */
  --surface-base: #F2F2F7;
  --surface-primary: #FFFFFF;
  --surface-elevated: #FFFFFF;
  --surface-secondary: #FFFFFF;
  --surface-tertiary: #F2F2F7;

  /* ── Text Hierarchy ── */
  --text-primary: #1C1C1E;
  --text-secondary: rgba(28, 28, 30, 0.55);
  --text-tertiary: rgba(28, 28, 30, 0.28);
  --text-quaternary: rgba(28, 28, 30, 0.15);
  --text-on-color: #FFFFFF;

  /* ── Separators & Fills ── */
  --separator: rgba(60, 60, 67, 0.08);
  --separator-opaque: #C6C6C8;
  --fill-tertiary: rgba(118, 118, 128, 0.12);
  --fill-quaternary: rgba(118, 118, 128, 0.08);
  --fill-secondary: rgba(120, 120, 128, 0.16);

  /* ── Chart Palette ── */
  --chart-primary: #30D158;
  --chart-gradient-top: rgba(48, 209, 88, 0.25);
  --chart-gradient-bottom: rgba(48, 209, 88, 0.01);
  --chart-danger: #FF453A;
  --chart-warning: #FF9F0A;
  --chart-info: #0A84FF;
  --chart-purple: #BF5AF2;

  /* ── Metric Accent Colors ── */
  --accent-weight: #30D158;
  --accent-bodyfat: #0A84FF;
  --accent-muscle: #FF9F0A;
  --accent-bmi: #FF453A;
  --accent-waist: #BF5AF2;
  --accent-chest: #64D2FF;

  /* ── Typography (SF Pro Scale) ── */
  --font-system: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
  --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, 'Cascadia Code', Menlo, monospace;

  /* Dynamic Type scale */
  --t-caption2: 0.6875rem; /* 11px */
  --t-caption1: 0.75rem;   /* 12px */
  --t-footnote: 0.8125rem; /* 13px */
  --t-subhead: 0.875rem;   /* 14px */
  --t-body: 0.9375rem;     /* 15px */
  --t-title3: 1rem;        /* 16px */
  --t-title2: 1.125rem;    /* 18px */
  --t-title1: 1.375rem;    /* 22px */
  --t-large-title: 1.625rem; /* 26px */
  --t-display1: 2rem;      /* 32px */
  --t-display2: 2.5rem;    /* 40px */
  --t-display3: 3.125rem;  /* 50px — hero numbers */

  /* Weights */
  --w-regular: 400;
  --w-medium: 500;
  --w-semibold: 600;
  --w-bold: 700;

  /* Tracking */
  --tracking-tight: -0.025em;
  --tracking-normal: -0.01em;
  --tracking-wide: 0.02em;

  /* ── Spacing ── */
  --sp-1: 2px;
  --sp-2: 4px;
  --sp-3: 8px;
  --sp-4: 12px;
  --sp-5: 16px;
  --sp-6: 20px;
  --sp-7: 24px;
  --sp-8: 28px;
  --sp-9: 32px;
  --sp-10: 40px;
  --sp-11: 48px;
  --sp-12: 64px;

  /* ── Radius (Apple HIG Continuum) ── */
  --r-xs: 4px;
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-2xl: 20px;
  --r-full: 9999px;

  /* ── Shadows (ultra-subtle, Apple style) ── */
  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.04);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.08);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.14);

  /* ── Motion ── */
  --ease-default: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 120ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
}

/* ── Dark Mode ── */
.dark {
  --surface-base: #000000;
  --surface-primary: #1C1C1E;
  --surface-elevated: #2C2C2E;
  --surface-secondary: #1C1C1E;
  --surface-tertiary: #2C2C2E;

  --text-primary: #FFFFFF;
  --text-secondary: rgba(235, 235, 245, 0.55);
  --text-tertiary: rgba(235, 235, 245, 0.28);
  --text-quaternary: rgba(235, 235, 245, 0.15);
  --text-on-color: #FFFFFF;

  --separator: rgba(235, 235, 245, 0.08);
  --separator-opaque: #38383A;
  --fill-tertiary: rgba(118, 118, 128, 0.24);
  --fill-quaternary: rgba(118, 118, 128, 0.16);
  --fill-secondary: rgba(120, 120, 128, 0.24);

  --color-primary-pale: rgba(48, 209, 88, 0.12);
  --color-primary-soft: rgba(48, 209, 88, 0.22);

  --shadow-1: 0 0.5px 0 rgba(0,0,0,0.2);
  --shadow-2: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-modal: 0 24px 80px rgba(0,0,0,0.5);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main>
      <div class="page-container">

        <!-- 1. NAV: Back + Progress Dots -->
        <nav style="padding-top: 56px; padding-left: var(--sp-5); padding-right: var(--sp-5); display: flex; align-items: center; gap: var(--sp-5);">
          <button data-dom-id="btn-back-3" style="display: flex; align-items: center; gap: var(--sp-1); background: none; border: none; cursor: pointer; color: var(--color-primary); font-size: var(--t-subhead); font-weight: var(--w-medium); font-family: var(--font-system); padding: var(--sp-2) 0; -webkit-tap-highlight-color: transparent;">
            <svg width="12" height="20" viewBox="0 0 12 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 2L2 10L10 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            返回
          </button>
          <div class="progress-dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot filled"></span>
          </div>
        </nav>

        <!-- 2. TITLE -->
        <h1 style="margin-top: var(--sp-7); padding-left: var(--sp-7); padding-right: var(--sp-7); font-size: var(--t-large-title); font-weight: var(--w-bold); color: var(--text-primary); letter-spacing: var(--tracking-tight); line-height: 1.2;">
          选择要追踪的指标
        </h1>

        <!-- 3. SUBTITLE -->
        <p style="margin-top: var(--sp-3); padding-left: var(--sp-7); padding-right: var(--sp-7); font-size: var(--t-body); font-weight: var(--w-regular); color: var(--text-secondary); letter-spacing: var(--tracking-normal); line-height: 1.47;">
          至少选择一个，之后可以在设置中修改
        </p>

        <!-- 4. METRIC LIST -->
        <div style="margin-top: var(--sp-6); padding: 0 var(--sp-5);">

          <!-- Section: 核心指标 -->
          <div style="padding: 0 var(--sp-3); margin-bottom: var(--sp-4);">
            <span style="font-size: var(--t-caption1); font-weight: var(--w-semibold); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em;">
              核心指标
            </span>
          </div>

          <div class="section-card">
            <!-- 体重 - SELECTED -->
            <div class="metric-row">
              <div class="metric-icon-circle" style="background: var(--accent-weight);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 3a4 4 0 0 0-4 4v2a4 4 0 0 0 8 0V7a4 4 0 0 0-4-4Z"/>
                  <path d="M16 11c1.5 1.3 2 3.5 2 6H6c0-2.5.5-4.7 2-6"/>
                  <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
              </div>
              <span class="metric-label">体重</span>
              <span class="metric-unit">(kg)</span>
              <svg class="check-selected" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="12" cy="12" r="10.5"/>
                <path d="M7.5 12.5l3 3 6-6.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </div>

            <!-- 体脂率 - SELECTED -->
            <div class="metric-row">
              <div class="metric-icon-circle" style="background: var(--chart-info);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10"/>
                  <path d="M22 12c0-5.52-4.48-10-10-10"/>
                  <path d="M12 2v10l7 4"/>
                </svg>
              </div>
              <span class="metric-label">体脂率</span>
              <span class="metric-unit">(%)</span>
              <svg class="check-selected" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="12" cy="12" r="10.5"/>
                <path d="M7.5 12.5l3 3 6-6.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </div>

            <!-- 肌肉量 - NOT SELECTED -->
            <div class="metric-row">
              <div class="metric-icon-circle" style="background: var(--chart-warning);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
                  <path d="M6 8H5a4 4 0 0 0 0 8h1"/>
                  <path d="M6 12h12"/>
                  <path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </div>
              <span class="metric-label">肌肉量</span>
              <span class="metric-unit">(kg)</span>
              <svg class="check-unselected" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </div>

            <!-- BMI - NOT SELECTED -->
            <div class="metric-row">
              <div class="metric-icon-circle" style="background: var(--chart-danger);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 3v18h18"/>
                  <path d="M7 16l4-6 4 3 5-8"/>
                </svg>
              </div>
              <span class="metric-label">BMI</span>
              <span class="metric-unit">(kg/m&sup2;)</span>
              <svg class="check-unselected" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </div>
          </div>

          <!-- Section: 围度测量 -->
          <div style="padding: 0 var(--sp-3); margin-top: var(--sp-6); margin-bottom: var(--sp-4);">
            <span style="font-size: var(--t-caption1); font-weight: var(--w-semibold); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em;">
              围度测量
            </span>
          </div>

          <div class="section-card">
            <!-- 腰围 -->
            <div class="metric-row">
              <div class="metric-icon-circle" style="background: var(--chart-purple);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.4 2.4 0 0 1 0-3.4l2.6-2.6a2.4 2.4 0 0 1 3.4 0Z"/>
                  <path d="m14.5 12.5 2-2"/>
                  <path d="m11.5 9.5 2-2"/>
                </svg>
              </div>
              <span class="metric-label">腰围</span>
              <span class="metric-unit">(cm)</span>
              <svg class="check-unselected" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </div>

            <!-- 臀围 -->
            <div class="metric-row">
              <div class="metric-icon-circle" style="background: var(--chart-purple);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.4 2.4 0 0 1 0-3.4l2.6-2.6a2.4 2.4 0 0 1 3.4 0Z"/>
                  <path d="m14.5 12.5 2-2"/>
                  <path d="m11.5 9.5 2-2"/>
                </svg>
              </div>
              <span class="metric-label">臀围</span>
              <span class="metric-unit">(cm)</span>
              <svg class="check-unselected" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </div>

            <!-- 胸围 -->
            <div class="metric-row">
              <div class="metric-icon-circle" style="background: var(--chart-purple);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.4 2.4 0 0 1 0-3.4l2.6-2.6a2.4 2.4 0 0 1 3.4 0Z"/>
                  <path d="m14.5 12.5 2-2"/>
                  <path d="m11.5 9.5 2-2"/>
                </svg>
              </div>
              <span class="metric-label">胸围</span>
              <span class="metric-unit">(cm)</span>
              <svg class="check-unselected" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </div>

            <!-- 臂围 -->
            <div class="metric-row">
              <div class="metric-icon-circle" style="background: var(--chart-purple);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.4 2.4 0 0 1 0-3.4l2.6-2.6a2.4 2.4 0 0 1 3.4 0Z"/>
                  <path d="m14.5 12.5 2-2"/>
                  <path d="m11.5 9.5 2-2"/>
                </svg>
              </div>
              <span class="metric-label">臂围</span>
              <span class="metric-unit">(cm)</span>
              <svg class="check-unselected" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- 5. CTA (pinned to bottom) -->
        <div style="margin-top: auto; padding: var(--sp-11) var(--sp-7) var(--sp-11) var(--sp-7);">
          <button class="cta-btn" data-dom-id="btn-done-3">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            开始记录
          </button>
        </div>

      </div>
    </main>
    <script>lucide.createIcons();</script>

    <style>
      /* ── Page-level: Onboarding Metrics ── */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--surface-base);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .page-container {
        max-width: 430px;
        margin: 0 auto;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        background: var(--surface-base);
        font-family: var(--font-system);
        color: var(--text-primary);
      }

      /* ── Progress Dots ── */
      .progress-dots {
        display: flex;
        gap: var(--sp-2);
        align-items: center;
        justify-content: center;
        flex: 1;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: var(--r-full);
        background: transparent;
        border: 1.5px solid var(--fill-secondary);
      }
      .dot.filled {
        background: var(--color-primary);
        border-color: var(--color-primary);
      }

      /* ── Metric Row ── */
      .metric-row {
        display: flex;
        align-items: center;
        padding: 14px 16px;
        gap: var(--sp-4);
        position: relative;
        cursor: pointer;
        transition: background var(--duration-fast) var(--ease-default);
        -webkit-tap-highlight-color: transparent;
      }
      .metric-row:active {
        background: var(--fill-quaternary);
      }
      .metric-row + .metric-row::before {
        content: '';
        position: absolute;
        top: 0;
        left: 60px;
        right: 0;
        height: 0.5px;
        background: var(--separator);
      }

      .metric-icon-circle {
        width: 28px;
        height: 28px;
        border-radius: var(--r-full);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .metric-icon-circle svg {
        width: 14px;
        height: 14px;
        color: #FFFFFF;
      }

      .metric-label {
        flex: 1;
        font-size: var(--t-body);
        font-weight: var(--w-regular);
        color: var(--text-primary);
        letter-spacing: var(--tracking-normal);
      }
      .metric-unit {
        font-size: var(--t-subhead);
        font-weight: var(--w-regular);
        color: var(--text-secondary);
        margin-right: var(--sp-4);
      }

      .check-selected {
        width: 22px;
        height: 22px;
        color: var(--color-primary);
        flex-shrink: 0;
      }
      .check-unselected {
        width: 22px;
        height: 22px;
        color: var(--fill-tertiary);
        flex-shrink: 0;
      }

      /* ── CTA Button ── */
      .cta-btn {
        width: 100%;
        height: 52px;
        border-radius: var(--r-lg);
        background: #FFFFFF;
        border: none;
        font-size: var(--t-body);
        font-weight: var(--w-semibold);
        color: var(--color-primary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--sp-3);
        transition: opacity var(--duration-fast) var(--ease-default);
        -webkit-tap-highlight-color: transparent;
        box-shadow: var(--shadow-2);
        font-family: var(--font-system);
        letter-spacing: var(--tracking-normal);
      }
      .cta-btn:active {
        opacity: 0.7;
      }
      .cta-btn svg {
        width: 18px;
        height: 18px;
      }

      /* ── Section Card ── */
      .section-card {
        background: #FFFFFF;
        border-radius: var(--r-xl);
        overflow: hidden;
        border: 0.5px solid var(--separator);
      }
    </style>
</body>
</html>
