name: FormLog
options:
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  defaultLanguage: swift
  deviceFamily:
    - iphone
  bundleIdPrefix: com.pangtong
  appIcon: AppIcon
  developmentLanguage: zh-Hans

settings:
  SWIFT_STRICT_CONCURRENCY: complete

targets:
  FormLog:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - project.yml
          - README.md
          - .git
          - .workbuddy
          - .claude
          - .gitnexus
          - bodylog-apple-redesign
          - Info.plist
          - privacy-policy.html
          - Tests
          - "*.md"
          - "*.py"
          - FormLog.xcodeproj
          - FormLog
          - FormLogWidget
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.formlog
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0.0
      SWIFT_VERSION: 5.0
      SWIFT_STRICT_CONCURRENCY: complete
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      ENABLE_BITCODE: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: NO
      LOCALIZATION_PREFERS_STRING_CATALOGS: NO
    dependencies: []

  FormLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.formlog.tests
      SWIFT_VERSION: "5.0"
      GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: FormLog

  FormLogWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: FormLogWidget
    settings:
      INFOPLIST_FILE: FormLogWidget/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.formlog.widget
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0.0
      SWIFT_VERSION: "5.0"
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      SKIP_INSTALL: YES
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    dependencies:
      - target: FormLog
        embed: false
